app = "ioms-backend"
primary_region = "iad"

[build]
  dockerfile = "../backend/Dockerfile"

[env]
  APP_ENV = "production"
  APP_NAME = "IOMS"
  JWT_ALGORITHM = "HS256"
  JWT_EXPIRE_MINUTES = "60"
  LOW_STOCK_THRESHOLD = "10"
  RUN_SEED = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
